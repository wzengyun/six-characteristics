version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: six-char-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: six_characteristics
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    container_name: six-char-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/six_characteristics?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: six-char-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:

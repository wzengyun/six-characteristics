server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/six_characteristics?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: SixCharacteristicsSecretKeyForJwtTokenGeneration2026
  expiration: 86400000

logging:
  level:
    com.sixchar: DEBUG
